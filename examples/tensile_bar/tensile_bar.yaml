# tensile_bar.yaml — Benchmark: uniaxial tension of a plate with a hole
# Expected result: peak von Mises stress ≈ Kt × σ_far = 3 × 100 MPa = 300 MPa (Kirsch)
# Mesh convergence: run with global_esize_m = 0.005, 0.002, 0.001 and check S11 convergence

problem:
  name: "tensile_bar"
  physics: "structural"
  spatial_dim: 3

mapdl:
  start_instance: true
  port: 50052
  ram_mb: 1024
  nproc: 1
  loglevel: "WARNING"

geometry:
  source: "parametric"
  plate:
    width_m:  0.10
    height_m: 0.10
    depth_m:  0.005
    hole_radius_m: 0.010

mesh:
  global_esize_m: 0.005
  hole_refinement_factor: 0.25
  quality_thresholds:
    aspect_ratio_max: 20.0
    jacobian_min: 0.0

elements:
  type: "SOLID186"
  keyopt: {k2: 0}

materials:
  - mat_id: 1
    name: "structural_steel"
    model: "elastic"
    E_Pa: 200.0e9
    nu: 0.30
    density_kg_m3: 7850.0

bcs:
  constraints:
    - {type: "fixed", axis: "X", side: "min", dofs: ["UX", "UY", "UZ"]}
  loads:
    - {type: "pressure", axis: "X", side: "max", value_Pa: -100.0e6}

solver:
  type: "static"
  nlgeom: false
  nsubst: {initial: 1, max: 1, min: 1}
  nropt: "FULL"

output:
  dir: "outputs/tensile_bar"
  export_csv: true
  export_vtk: true
  save_screenshots: true
